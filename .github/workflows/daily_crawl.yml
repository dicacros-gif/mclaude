name: Daily Midjourney Crawl

on:
  schedule:
    # 매일 UTC 02:00 (한국시간 11:00) 실행
    - cron: "0 2 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  crawl:
    runs-on: ubuntu-latest
    timeout-minutes: 90

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      - name: Install Playwright Chromium
        run: python -m playwright install --with-deps chromium

      - name: Run scraper
        # MJ_COOKIES: 선택 - 없어도 3개 탭 모두 크롤링 시도
        env:
          MJ_COOKIES: ${{ secrets.MJ_COOKIES }}
          PYTHONIOENCODING: utf-8
        run: python scraper.py

      - name: Commit and push
        run: |
          git config --local user.email "actions@github.com"
          git config --local user.name "GitHub Actions"

          # 썸네일 파일 + metadata.json + index.html 스테이징
          git add data/metadata.json index.html
          git add media/ 2>/dev/null || true

          if git diff --staged --quiet; then
            echo "No changes to commit."
          else
            TIMESTAMP=$(date -u +"%Y-%m-%d %H:%M UTC")
            COUNT=$(python -c "import json; print(len(json.load(open('data/metadata.json'))))")
            git commit -m "crawl: $TIMESTAMP  (total $COUNT)"
            git push
            echo "Pushed. Total: $COUNT items."
          fi
