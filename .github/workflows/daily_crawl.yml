name: Daily Midjourney Crawl

on:
  schedule:
    # 매일 UTC 02:00 (한국시간 11:00) 실행
    - cron: "0 2 * * *"
  workflow_dispatch:
    inputs:
      debug:
        description: "Enable debug output"
        required: false
        default: "false"

permissions:
  contents: write

jobs:
  crawl:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      - name: Install Playwright browsers
        run: python -m playwright install --with-deps chromium

      - name: Run scraper
        env:
          MJ_COOKIES: ${{ secrets.MJ_COOKIES }}
        run: |
          echo "=== Scraping Midjourney Explore ==="
          python scraper.py

      - name: Generate gallery HTML
        run: |
          echo "=== Generating gallery ==="
          python generate_gallery.py

      - name: Commit and push if changed
        run: |
          git config --local user.email "actions@github.com"
          git config --local user.name "GitHub Actions"
          git add data/metadata.json index.html
          if git diff --staged --quiet; then
            echo "No changes to commit."
          else
            TIMESTAMP=$(date -u +"%Y-%m-%d %H:%M UTC")
            COUNT=$(python -c "import json; d=json.load(open('data/metadata.json')); print(len(d))")
            git commit -m "crawl: $TIMESTAMP (total $COUNT items)"
            git push
            echo "Pushed $COUNT total items."
          fi
