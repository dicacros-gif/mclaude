<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Midjourney Top Gallery</title>
<style>
  :root {
    --bg: #0d0d0d;
    --card: #1a1a1a;
    --accent: #7c6ff7;
    --text: #e0e0e0;
    --muted: #888;
    --border: #2a2a2a;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    min-height: 100vh;
  }
  header {
    position: sticky;
    top: 0;
    z-index: 100;
    background: rgba(13,13,13,0.92);
    backdrop-filter: blur(12px);
    border-bottom: 1px solid var(--border);
    padding: 14px 24px;
    display: flex;
    align-items: center;
    gap: 20px;
    flex-wrap: wrap;
  }
  header h1 {
    font-size: 1.1rem;
    font-weight: 600;
    color: var(--accent);
    flex-shrink: 0;
  }
  .meta { font-size: 0.75rem; color: var(--muted); flex-shrink: 0; }
  .tabs {
    display: flex;
    gap: 6px;
    flex-wrap: wrap;
  }
  .tab-btn {
    padding: 6px 16px;
    border-radius: 20px;
    border: 1px solid var(--border);
    background: transparent;
    color: var(--muted);
    font-size: 0.82rem;
    cursor: pointer;
    transition: all 0.2s;
  }
  .tab-btn:hover { border-color: var(--accent); color: var(--text); }
  .tab-btn.active {
    background: var(--accent);
    border-color: var(--accent);
    color: #fff;
  }
  #count { font-size: 0.78rem; color: var(--muted); margin-left: auto; }
  .grid {
    columns: 5;
    column-gap: 6px;
    padding: 20px;
  }
  @media (max-width: 1400px) { .grid { columns: 4; } }
  @media (max-width: 1000px) { .grid { columns: 3; } }
  @media (max-width: 640px)  { .grid { columns: 2; } }
  .card {
    break-inside: avoid;
    margin-bottom: 6px;
    border-radius: 8px;
    overflow: hidden;
    position: relative;
    background: var(--card);
    cursor: pointer;
  }
  .card img, .card video {
    width: 100%;
    height: auto;
    display: block;
    transition: opacity 0.3s;
  }
  .card img.loading { opacity: 0; }
  .overlay {
    position: absolute;
    inset: 0;
    background: linear-gradient(to top, rgba(0,0,0,0.85) 0%, transparent 50%);
    opacity: 0;
    transition: opacity 0.25s;
    display: flex;
    flex-direction: column;
    justify-content: flex-end;
    padding: 12px;
    pointer-events: none;
  }
  .card:hover .overlay { opacity: 1; }
  .overlay .prompt {
    font-size: 0.72rem;
    color: #ddd;
    line-height: 1.4;
    display: -webkit-box;
    -webkit-line-clamp: 4;
    -webkit-box-orient: vertical;
    overflow: hidden;
  }
  .overlay .user {
    font-size: 0.68rem;
    color: var(--accent);
    margin-top: 4px;
  }
  .type-badge {
    position: absolute;
    top: 8px;
    right: 8px;
    background: rgba(0,0,0,0.65);
    color: #ccc;
    font-size: 0.62rem;
    padding: 2px 7px;
    border-radius: 4px;
    pointer-events: none;
  }
  .empty {
    text-align: center;
    padding: 80px 20px;
    color: var(--muted);
    font-size: 0.9rem;
  }
</style>
</head>
<body>
<header>
  <h1>🎨 Midjourney Top Gallery</h1>
  <span class="meta">갱신: 2026-05-30 02:55 UTC · 총 0개</span>
  <div class="tabs">
    <button class="tab-btn active" onclick="filter('all')">All</button>
    <button class="tab-btn" onclick="filter('image')">Images</button>
    <button class="tab-btn" onclick="filter('style')">Styles</button>
    <button class="tab-btn" onclick="filter('video')">Videos</button>
  </div>
  <span id="count"></span>
</header>

<div class="grid" id="grid"></div>

<script>
const ALL_ITEMS = [];
let currentFilter = 'all';

function filter(type) {
  currentFilter = type;
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  event.target.classList.add('active');
  render();
}

function render() {
  const items = currentFilter === 'all'
    ? ALL_ITEMS
    : ALL_ITEMS.filter(i => i.type === currentFilter);

  document.getElementById('count').textContent = items.length + '개';
  const grid = document.getElementById('grid');

  if (!items.length) {
    grid.innerHTML = '<div class="empty">항목이 없습니다.</div>';
    return;
  }

  grid.innerHTML = items.map(item => buildCard(item)).join('');

  // Lazy-load images
  const imgs = grid.querySelectorAll('img[data-src]');
  const io = new IntersectionObserver((entries) => {
    entries.forEach(e => {
      if (e.isIntersecting) {
        const img = e.target;
        img.src = img.dataset.src;
        img.classList.remove('loading');
        io.unobserve(img);
      }
    });
  }, { rootMargin: '400px' });
  imgs.forEach(img => io.observe(img));
}

function buildCard(item) {
  const isVideo = item.type === 'video';
  const link = item.link || '#';
  const prompt = (item.prompt || '').replace(/"/g, '&quot;').slice(0, 200);
  const user = item.username ? '@' + item.username : '';
  const badge = item.type === 'video' ? '▶ Video' : item.type === 'style' ? '✦ Style' : '';

  const media = isVideo
    ? `<video src="${item.url}" poster="${item.poster || ''}" loop muted playsinline
          onmouseover="this.play()" onmouseout="this.pause();this.currentTime=0"
          style="max-height:600px;object-fit:cover"></video>`
    : `<img class="loading" data-src="${item.url}" alt="${prompt}" loading="lazy"
         onerror="this.parentElement.style.display='none'">`;

  return `<div class="card" onclick="window.open('${link}','_blank')">
    ${media}
    ${badge ? `<span class="type-badge">${badge}</span>` : ''}
    <div class="overlay">
      ${prompt ? `<div class="prompt">${prompt}</div>` : ''}
      ${user ? `<div class="user">${user}</div>` : ''}
    </div>
  </div>`;
}

render();
</script>
</body>
</html>
